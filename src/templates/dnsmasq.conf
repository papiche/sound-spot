# SoundSpot — dnsmasq
interface=uap0
bind-interfaces
dhcp-range=${DHCP_START},${DHCP_END},24h
dhcp-option=3,${SPOT_IP}
dhcp-option=6,${SPOT_IP}

# ── Détection portail captif (Android / iOS / Windows) ──────────
# Rediriger les domaines de vérification de connectivité vers le RPi.
# → HTTP atterrit sur lighttpd (→ portail) ; HTTPS échoue (pas de cert)
#   ce double échec force Android/iOS à afficher la fenêtre portail.
address=/connectivitycheck.gstatic.com/${SPOT_IP}
address=/connectivitycheck.android.com/${SPOT_IP}
address=/captive.apple.com/${SPOT_IP}
address=/www.msftconnecttest.com/${SPOT_IP}
address=/www.msftncsi.com/${SPOT_IP}

# Cache DNS local
cache-size=300
no-resolv
# Serveurs DNS publics (Google + Cloudflare)
server=8.8.8.8
server=1.1.1.1
log-dhcp

# Déclenche dhcp_trigger.sh à chaque bail → ajoute IP dans soundspot_auth
dhcp-script=/opt/soundspot/dhcp_trigger.sh
