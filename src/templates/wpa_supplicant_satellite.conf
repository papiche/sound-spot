ctrl_interface=DIR=/var/run/wpa_supplicant GROUP=netdev
update_config=1
country=FR

# AP SoundSpot maître — connexion directe prioritaire
# Le satellite utilise le gateway (192.168.10.1) comme maître Snapcast
network={
    ssid="${SPOT_NAME}"
    key_mgmt=NONE
    priority=20
    bgscan="simple:30:-75:300"
}

# Réseau amont — fallback Internet + mDNS quand l'AP maître est hors portée
network={
    ssid="${WIFI_SSID}"
    psk="${WIFI_PASS}"
    priority=10
}
