# /etc/pipewire/pipewire.conf.d/50-soundspot-null.conf
# Sink virtuel de secours — garantit qu'il existe toujours au moins un sink
# même quand l'enceinte Bluetooth est éteinte.
# snapclient démarre sur ce sink, puis WirePlumber bascule vers BT dès connexion.
context.objects = [
  { factory = adapter
    args = {
      factory.name     = support.null-audio-sink
      node.name        = "soundspot-null"
      node.description = "SoundSpot Fallback"
      media.class      = "Audio/Sink"
      audio.position   = [ FL FR ]
    }
  }
]
