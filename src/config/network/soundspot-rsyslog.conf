# /etc/rsyslog.d/40-soundspot.conf
# SoundSpot — Centralisation des logs systemd → /var/log/sound-spot.log
#
# Capture tous les messages journald dont l'identifiant syslog commence par
# "soundspot-", ou dont le programme est "picoport" ou "ipfs".
# Les messages sont aussi conservés dans /var/log/syslog (pas de "stop").

if $programname startswith 'soundspot-'
   or $programname == 'picoport'
   or $programname == 'ipfs'
then {
    action(type="omfile"
        file="/var/log/sound-spot.log"
        fileCreateMode="0644"
        dirCreateMode="0755")
}
