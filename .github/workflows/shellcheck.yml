name: ShellCheck
on:[push, pull_request]
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # <-- Correction du warning Node.js
      
      - name: Run ShellCheck (Errors only)
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: "-e SC2086 -e SC2155 -S error" # Ignore les erreurs mineures de guillemets et ne fail que sur les erreurs graves
        with:
          scandir: './src'
